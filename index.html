<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS 配車表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f0;
  --card:#ffffff;
  --border:#e5e5e0;
  --text:#1a1a1a;
  --muted:#6b6b66;
  --blue:#185FA5;
  --blue-bg:#E6F1FB;
  --blue-text:#0C447C;
  --green:#3B6D11;
  --green-bg:#EAF3DE;
  --amber:#854F0B;
  --amber-bg:#FAEEDA;
  --gray-bg:#F1EFE8;
  --gray-text:#5F5E5A;
  --radius:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--card:#252522;--border:#3a3a36;
    --text:#e8e8e0;--muted:#9a9a90;
    --blue-bg:#0c2a4a;--blue-text:#85B7EB;
    --green-bg:#1a2e0a;
    --amber-bg:#2e1f06;
    --gray-bg:#2a2a26;--gray-text:#9a9a90;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}

.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:14px 16px 10px;position:sticky;top:0;z-index:50;
}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:18px;font-weight:600;letter-spacing:-.3px;}
.topbar .sub{font-size:12px;color:var(--muted);margin-top:2px;}
.updated{font-size:11px;color:var(--muted);margin-top:3px;}

.reload-btn{
  padding:7px 14px;font-size:13px;font-weight:600;
  background:var(--blue);color:#fff;border:none;
  border-radius:8px;cursor:pointer;white-space:nowrap;
  font-family:inherit;
}
.reload-btn:active{opacity:.85;}

.tabs{
  display:grid;grid-template-columns:1fr 1fr;
  background:var(--card);border-bottom:1px solid var(--border);
}
.tab{
  padding:11px 8px;font-size:13px;font-weight:500;text-align:center;
  border:none;background:transparent;cursor:pointer;color:var(--muted);
  border-bottom:2px solid transparent;font-family:inherit;
  transition:color .15s,border-color .15s;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}

.pane{display:none;padding:12px 12px 100px;}
.pane.active{display:block;}

.date-badge{
  font-size:13px;font-weight:600;color:var(--blue-text);
  background:var(--blue-bg);
  padding:6px 12px;border-radius:20px;
  display:inline-block;margin-bottom:10px;
}

.bus-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;overflow:hidden;
}
.bus-head{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--gray-bg);
}
.bus-no{
  font-size:13px;font-weight:700;color:var(--gray-text);
  background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:2px 8px;white-space:nowrap;
}
.bus-school{font-size:13px;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bus-driver-main{font-size:12px;color:var(--muted);margin-left:auto;white-space:nowrap;}

.trips{padding:4px 0;}
.trip-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-bottom:1px solid var(--border);
}
.trip-row:last-child{border-bottom:none;}
.trip-badge{
  font-size:10px;font-weight:700;min-width:28px;text-align:center;
  padding:2px 6px;border-radius:10px;
  background:var(--blue-bg);color:var(--blue-text);
}
.trip-school{font-size:13px;color:var(--text);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trip-driver{font-size:12px;color:var(--muted);white-space:nowrap;}
.trip-time{font-size:12px;color:var(--blue);font-weight:600;
  white-space:nowrap;margin-left:4px;}

.driver-section{margin-bottom:16px;}
.driver-name-head{
  font-size:14px;font-weight:700;color:var(--text);
  padding:8px 14px 6px;display:flex;align-items:center;gap:8px;
}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--blue-bg);color:var(--blue-text);
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.driver-trip-row{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;margin:0 0 6px;padding:10px 12px;
  display:flex;gap:10px;align-items:flex-start;
}
.day-pill{
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;
}
.day-today{background:var(--blue-bg);color:var(--blue-text);}
.day-tomorrow{background:var(--green-bg);color:var(--green);}
.driver-detail{font-size:12px;color:var(--muted);margin-top:2px;}

.loading{
  text-align:center;padding:48px 16px;color:var(--muted);font-size:14px;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}

.error-box{
  background:#FCEBEB;border:1px solid #F09595;border-radius:10px;
  padding:14px;margin:16px 0;font-size:13px;color:#791F1F;
  line-height:1.6;
}
.empty{
  text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div>
      <h1>ISS 配車表</h1>
      <div class="sub" id="today-label">読み込み中...</div>
    </div>
    <button class="reload-btn" onclick="loadData()">更新</button>
  </div>
  <div class="updated" id="updated-label"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('buses',this)">バス別</button>
  <button class="tab" onclick="showTab('drivers',this)">乗務員別</button>
</div>

<div class="pane active" id="pane-buses">
  <div id="buses-content">
    <div class="loading"><div class="spinner"></div>データを読み込んでいます...</div>
  </div>
</div>

<div class="pane" id="pane-drivers">
  <div id="drivers-content">
    <div class="loading"><div class="spinner"></div>データを読み込んでいます...</div>
  </div>
</div>

<script>
// =====================================================
// GAS URL（固定）
// =====================================================
var GAS_URL = "https://script.google.com/macros/s/AKfycbyXjPf1repaPzsHHrXiTR1qku-sG-Kc7F71pzx48WlexiyTC8Z6jUDYEVGRSHpENGdv/exec";

var appData = null;

// =====================================================
// データ取得
// =====================================================
function loadData() {
  showLoading();
  var script = document.createElement('script');
  var cbName = '_cb' + Date.now();
  window[cbName] = function(data) {
    try { document.head.removeChild(script); } catch(e) {}
    delete window[cbName];
    appData = data;
    renderAll();
  };
  script.onerror = function() {
    try { document.head.removeChild(script); } catch(e) {}
    delete window[cbName];
    showError('スプレッドシートからデータを取得できませんでした。\n\n・インターネット接続を確認してください\n・しばらく待ってから「更新」ボタンを押してください');
  };
  script.src = GAS_URL + '?callback=' + cbName + '&t=' + Date.now();
  document.head.appendChild(script);
}

function showLoading() {
  var html = '<div class="loading"><div class="spinner"></div>スプレッドシートから読み込み中...</div>';
  document.getElementById('buses-content').innerHTML = html;
  document.getElementById('drivers-content').innerHTML = html;
}

function showError(msg) {
  var html = '<div class="error-box">⚠️ ' + msg.replace(/\n/g,'<br>') + '</div>';
  document.getElementById('buses-content').innerHTML = html;
  document.getElementById('drivers-content').innerHTML = html;
}

// =====================================================
// 描画
// =====================================================
function renderAll() {
  var data = appData;
  document.getElementById('today-label').textContent =
    '当日：' + data.today.date + '　翌日：' + data.tomorrow.date;
  document.getElementById('updated-label').textContent =
    '最終更新：' + data.lastUpdated;
  renderBuses(data);
  renderDrivers(data);
}

// ---- バス別 ----
function renderBuses(data) {
  var html = '';
  html += '<div class="date-badge">当日　' + data.today.date + '</div>';
  data.today.buses.forEach(function(bus) { html += buildBusCard(bus); });
  html += '<div class="date-badge" style="margin-top:16px;">翌日　' + data.tomorrow.date + '</div>';
  data.tomorrow.buses.forEach(function(bus) { html += buildBusCard(bus); });
  document.getElementById('buses-content').innerHTML = html;
}

function buildBusCard(bus) {
  var html = '<div class="bus-card">';
  if (bus.trips.length === 0) {
    html += '<div class="bus-head">'
      + '<span class="bus-no">バス ' + esc(bus.busNo) + '</span>'
      + '<span class="bus-school" style="color:var(--muted);">未割当</span>'
      + '</div>';
  } else if (bus.trips.length === 1) {
    var t = bus.trips[0];
    html += '<div class="bus-head">'
      + '<span class="bus-no">バス ' + esc(bus.busNo) + '</span>'
      + '<span class="bus-school">' + esc(t.school) + '</span>'
      + '<span class="bus-driver-main">' + esc(t.driver) + '</span>'
      + '</div>';
    if (t.time) {
      html += '<div class="trips"><div class="trip-row">'
        + '<span class="trip-time">' + esc(t.time) + '</span></div></div>';
    }
  } else {
    html += '<div class="bus-head">'
      + '<span class="bus-no">バス ' + esc(bus.busNo) + '</span>'
      + '<span class="bus-school">' + bus.trips.length + '回運行</span>'
      + '</div><div class="trips">';
    bus.trips.forEach(function(t, i) {
      html += '<div class="trip-row">'
        + '<span class="trip-badge">' + (i+1) + '回</span>'
        + '<span class="trip-school">' + esc(t.school) + '</span>'
        + '<span class="trip-driver">' + esc(t.driver) + '</span>'
        + (t.time ? '<span class="trip-time">' + esc(t.time) + '</span>' : '')
        + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// ---- 乗務員別 ----
function renderDrivers(data) {
  var driverMap = {};
  function addTrips(buses, dayLabel, dayClass) {
    buses.forEach(function(bus) {
      bus.trips.forEach(function(t) {
        if (!t.driver) return;
        if (!driverMap[t.driver]) driverMap[t.driver] = [];
        driverMap[t.driver].push({
          busNo: bus.busNo, school: t.school,
          time: t.time, dayLabel: dayLabel, dayClass: dayClass
        });
      });
    });
  }
  addTrips(data.today.buses,    '当日 ' + data.today.date,    'day-today');
  addTrips(data.tomorrow.buses, '翌日 ' + data.tomorrow.date, 'day-tomorrow');

  var names = Object.keys(driverMap).sort();
  var html = '';
  if (names.length === 0) {
    html = '<div class="empty">乗務員データがありません</div>';
  } else {
    names.forEach(function(name) {
      var trips = driverMap[name];
      var initials = name.length >= 2 ? name.slice(0,1) + name.slice(-1) : name;
      html += '<div class="driver-section">'
        + '<div class="driver-name-head">'
        + '<div class="avatar">' + esc(initials) + '</div>'
        + esc(name) + '（' + trips.length + '件）'
        + '</div>';
      trips.forEach(function(tr) {
        html += '<div class="driver-trip-row">'
          + '<span class="day-pill ' + tr.dayClass + '">' + esc(tr.dayLabel) + '</span>'
          + '<div><div style="font-size:13px;font-weight:600;">バス ' + esc(tr.busNo) + '</div>'
          + '<div class="driver-detail">' + esc(tr.school)
          + (tr.time ? '　' + esc(tr.time) : '') + '</div></div>'
          + '</div>';
      });
      html += '</div>';
    });
  }
  document.getElementById('drivers-content').innerHTML = html;
}

// =====================================================
// ユーティリティ
// =====================================================
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// =====================================================
// 起動
// =====================================================
window.onload = function() {
  loadData();
};
</script>
</body>
</html>

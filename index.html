<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ══ iPhoneホーム画面アイコン設定 ══ -->
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./apple-touch-icon.png">
  <link rel="shortcut icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ISS配車表">
  <meta name="theme-color" content="#000000">
  <title>ISS 配車表</title>
  <style>
    /* ===== リセット・ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f2f5;
      color: #222;
      font-size: 14px;
      font-weight: 500;
    }

    /* ===== ヘッダー ===== */
    header {
      background: #1a3a5c;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-weight: 800; font-size: 13px; color: #f0c040; letter-spacing: 0.5px; }
    header h1 { font-size: 18px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .date-chip {
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .btn-update {
      background: #f0c040;
      color: #1a3a5c;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-update:hover { background: #ffd700; }
    .last-updated { font-size: 11px; color: rgba(255,255,255,0.65); }

    /* ===== タブ ===== */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e0e4ea;
      overflow-x: auto;
    }
    .tab-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 8px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
    }
    .tab-btn.active {
      color: #1a3a5c;
      border-bottom-color: #1a3a5c;
    }

    /* ===== コンテンツエリア ===== */
    .content { padding: 12px; max-width: 700px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== 日付セクション ===== */
    .day-section { margin-bottom: 20px; }
    .day-header {
      background: #1a3a5c;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px 8px 0 0;
      font-weight: 700;
      font-size: 14px;
    }

    /* ===== バスカード ===== */
    .bus-card {
      background: #fff;
      border-radius: 0 0 8px 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .bus-card + .bus-card { border-radius: 8px; }
    .bus-title {
      background: #e8edf5;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px 8px 0 0;
    }
    .bus-badge {
      background: #1a3a5c;
      color: #fff;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
    }
    .vehicle-code {
      background: #f0c040;
      color: #1a3a5c;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .trip-count {
      font-size: 11px;
      color: #666;
      font-weight: 400;
    }
    .unassigned {
      padding: 10px 12px;
      color: #bbb;
      font-size: 12px;
    }

    /* ===== 便テーブル ===== */
    .trip-table { width: 100%; border-collapse: collapse; }
    .trip-table th {
      background: #f5f7fb;
      padding: 6px 8px;
      font-size: 11px;
      color: #666;
      text-align: left;
      border-bottom: 1px solid #e8edf5;
    }
    .trip-table td {
      padding: 8px 8px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 13px;
      font-weight: 500;
      vertical-align: middle;
    }
    .trip-table tr:last-child td { border-bottom: none; }
    .trip-num {
      background: #1a3a5c;
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    .driver-name {
      font-weight: 600;
      color: #1a3a5c;
    }
    .school-text { color: #333; }
    .time-chip {
      display: inline-block;
      background: #e8f4fd;
      color: #1a6aa0;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .time-na { color: #ccc; font-size: 11px; }

    /* ===== 時刻表タブ ===== */
    .schedule-card {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .schedule-title {
      background: #1a3a5c;
      color: #fff;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .schedule-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
      gap: 4px;
      padding: 6px 10px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 12px;
      align-items: center;
    }
    .schedule-row:last-child { border-bottom: none; }
    .schedule-header {
      background: #f5f7fb;
      font-weight: 700;
      font-size: 11px;
      color: #888;
    }
    .time-val { color: #1a6aa0; font-weight: 600; }
    .period-tag {
      font-size: 10px;
      background: #fff3cd;
      color: #856404;
      border-radius: 4px;
      padding: 1px 5px;
    }

    /* ===== 乗務員タブ ===== */
    .driver-card {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .driver-header {
      background: #2d5a8e;
      color: #fff;
      padding: 8px 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .driver-count {
      font-size: 11px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 2px 8px;
    }
    .driver-trip-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .driver-trip-row:last-child { border-bottom: none; }
    .day-tag {
      font-size: 10px;
      background: #ddeeff;
      color: #1a3a5c;
      border-radius: 4px;
      padding: 2px 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    .day-tag.tomorrow { background: #e8f5e9; color: #2e7d32; }

    /* ===== 通知生成タブ ===== */
    .notify-section { margin-bottom: 16px; }
    .notify-header {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      color: #1a3a5c;
    }
    .notify-box {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .notify-driver-header {
      background: #2d5a8e;
      color: #fff;
      padding: 8px 12px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .notify-text {
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      color: #333;
      background: #fafafa;
    }
    .btn-copy {
      background: #f0c040;
      color: #1a3a5c;
      border: none;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-copy:active { opacity: 0.7; }

    /* ===== ローディング・エラー ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 15px;
    }
    .error-msg {
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 16px;
      color: #c00;
      font-size: 13px;
    }

    /* ===== スマホ最適化 ===== */
    @media (max-width: 480px) {
      .schedule-row { grid-template-columns: repeat(3, 1fr); }
      .schedule-row > *:nth-child(n+4) { display: none; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header>
  <div class="header-left">
    <div class="logo">NAGANO TRANSPORT</div>
    <h1>ISS 配車表</h1>
  </div>
  <div class="header-right">
    <span class="date-chip" id="dateChip">読込中...</span>
    <button class="btn-update" onclick="loadData()">更新</button>
  </div>
</header>
<div style="text-align:right; padding:4px 12px; background:#fff; font-size:11px; color:#999;" id="lastUpdated"></div>

<!-- タブ -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('bus')">🏫 校舎別</button>
  <button class="tab-btn"        onclick="switchTab('driver')">👤 乗務員別</button>
  <button class="tab-btn"        onclick="switchTab('timetable')">🕐 時刻表</button>
  <button class="tab-btn"        onclick="switchTab('notify')">📋 運行詳細</button>
</div>

<!-- コンテンツ -->
<div class="content">
  <div id="tab-bus"       class="tab-panel active"><div class="loading">読み込み中...</div></div>
  <div id="tab-driver"    class="tab-panel"><div class="loading">読み込み中...</div></div>
  <div id="tab-timetable" class="tab-panel"><div class="loading">読み込み中...</div></div>
  <div id="tab-notify"    class="tab-panel"><div class="loading">読み込み中...</div></div>
</div>

<script>
// =====================================================
// ★ ここに Apps Script の URL を入れてください ★
// =====================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXjPf1repaPzsHHrXiTR1qku-sG-Kc7F71pzx48WlexiyTC8Z6jUDYEVGRSHpENGdv/exec';

// =====================================================
// ★ 車両コード（バス番号 → 車両コード）★
// 例: '1': '福岡200か1234'
// バスが増えたらここに追記してください
// =====================================================
const VEHICLE_CODES = {
  '1':     '2001',
  '2':     '2002',
  '3':     '2003',
  '4':     '2304',
  '5':     '2005',
  '1658':  '1658',
  '1673':  '1673',
  '1679':  '1679',
  '1680':  '1680',
  '1681':  '1681',
  'イトマン': '99988',
};
// =====================================================

let appData = null;

// ─── データ読み込み ───
async function loadData() {
  setLoading();
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    appData = json;
    renderAll();
  } catch (e) {
    showError('データの読み込みに失敗しました。<br>Apps Script URL を確認してください。<br>' + e.message);
  }
}

function setLoading() {
  ['bus','driver','timetable','notify'].forEach(t => {
    document.getElementById('tab-' + t).innerHTML = '<div class="loading">読み込み中...</div>';
  });
}

function showError(msg) {
  ['bus','driver','timetable','notify'].forEach(t => {
    document.getElementById('tab-' + t).innerHTML = '<div class="error-msg">' + msg + '</div>';
  });
}

// ─── タブ切り替え ───
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['bus','driver','timetable','notify'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── 日付を M/d 形式に整形 ───
function fmtDate(d) {
  if (!d) return '';
  const p = new Date(d);
  if (!isNaN(p.getTime())) {
    return (p.getMonth() + 1) + '/' + p.getDate();
  }
  return String(d);
}

// ─── 全描画 ───
function renderAll() {
  if (!appData) return;

  // ヘッダー更新
  const today = fmtDate(appData.today?.date);
  const tmr   = fmtDate(appData.tomorrow?.date);
  document.getElementById('dateChip').textContent = '当日：' + today + '　翌日：' + tmr;
  document.getElementById('lastUpdated').textContent = '最終更新：' + (appData.lastUpdated || '');

  renderBus();
  renderDriver();
  renderTimetable();
  renderNotify();
}

// ─────────────────────────────────────
// ① 校舎別タブ（ISS校舎ごとに学校・乗務員・時刻を表示）
// ─────────────────────────────────────
function renderBus() {
  // 校舎ごとに {today: [], tomorrow: []} でまとめる
  const branchMap = {};

  ['today', 'tomorrow'].forEach(day => {
    const dayData = appData[day];
    if (!dayData?.buses) return;
    dayData.buses.forEach(busEntry => {
      busEntry.trips.forEach(trip => {
        const { schoolName, branchName } = parseSchoolBranch(trip.school);
        const key = branchName || '（未設定）';
        if (!branchMap[key]) branchMap[key] = { today: [], tomorrow: [] };
        branchMap[key][day].push({
          schoolName: schoolName,
          schoolFull: trip.school,   // 時刻検索用（"学校名 / 校舎名"）
          driver: trip.driver,
          tripNum: trip.tripNum
        });
      });
    });
  });

  let html = '';
  Object.keys(branchMap).sort((a, b) => a.localeCompare(b, 'ja')).forEach(branchName => {
    const { today: todayTrips, tomorrow: tmrTrips } = branchMap[branchName];
    const totalTrips = todayTrips.length + tmrTrips.length;
    if (totalTrips === 0) return;

    html += '<div class="bus-card">';
    html += '<div class="bus-title">';
    html += '<span class="bus-badge" style="font-size:13px; padding:4px 12px;">🏫 ' + branchName + '</span>';
    html += '</div>';

    [
      { trips: todayTrips, dayData: appData.today,    label: '当日' },
      { trips: tmrTrips,   dayData: appData.tomorrow, label: '翌日' },
    ].forEach(({ trips, dayData, label }) => {
      if (!trips || trips.length === 0) return;
      const dateStr = fmtDate(dayData?.date);

      html += '<div style="background:#f0f4fa; padding:5px 12px; font-size:11px; font-weight:700; color:#1a3a5c; border-top:1px solid #dde4f0;">';
      html += label + '　' + dateStr;
      html += '</div>';

      html += '<table class="trip-table">';
      html += '<tr><th>学校名</th><th>乗務員</th><th>学校出発</th><th>学校到着</th></tr>';
      trips.forEach(trip => {
        const timeInfo = getScheduleTime(trip.schoolFull, trip.tripNum);
        html += '<tr>';
        html += '<td class="school-text">' + (trip.schoolName || '—') + '</td>';
        html += '<td class="driver-name">' + (trip.driver || '—') + '</td>';
        html += '<td>' + (timeInfo.schoolDepart ? '<span class="time-chip">出 ' + timeInfo.schoolDepart + '</span>' : '<span class="time-na">—</span>') + '</td>';
        html += '<td>' + (timeInfo.schoolArrive ? '<span class="time-chip">着 ' + timeInfo.schoolArrive + '</span>' : '<span class="time-na">—</span>') + '</td>';
        html += '</tr>';
      });
      html += '</table>';
    });

    html += '</div>';
  });

  document.getElementById('tab-bus').innerHTML = html || '<div class="loading">データなし</div>';
}

// ─────────────────────────────────────
// ② 乗務員別タブ
// ─────────────────────────────────────
function renderDriver() {
  const driverMap = {};

  const addTrips = (dayData, dayLabel, isTomorrow) => {
    if (!dayData?.buses) return;
    dayData.buses.forEach(busEntry => {
      busEntry.trips.forEach(trip => {
        if (!trip.driver) return;
        if (!driverMap[trip.driver]) driverMap[trip.driver] = [];
        const timeInfo = getScheduleTime(trip.school, trip.tripNum);
        driverMap[trip.driver].push({
          bus: busEntry.bus,
          tripNum: trip.tripNum,
          school: trip.school,
          schoolDepart: timeInfo.schoolDepart,
          ssArrive: timeInfo.ssArrive,
          ssDepart: timeInfo.ssDepart,
          schoolArrive: timeInfo.schoolArrive,
          dayLabel, isTomorrow
        });
      });
    });
  };

  addTrips(appData.today,    '当日 ' + fmtDate(appData.today?.date),    false);
  addTrips(appData.tomorrow, '翌日 ' + fmtDate(appData.tomorrow?.date), true);

  let html = '';
  Object.entries(driverMap).sort(([a],[b]) => a.localeCompare(b)).forEach(([driver, trips]) => {
    html += '<div class="driver-card">';
    html += '<div class="driver-header"><span>👤 ' + driver + '</span>';
    html += '<span class="driver-count">' + trips.length + '件</span></div>';
    trips.forEach(t => {
      html += '<div class="driver-trip-row">';
      html += '<span class="day-tag' + (t.isTomorrow ? ' tomorrow' : '') + '">' + fmtDate(t.isTomorrow ? appData.tomorrow?.date : appData.today?.date) + '</span>';
      html += '<span class="trip-num">' + t.tripNum + '</span>';
      html += '<span class="bus-badge" style="font-size:11px;">' + t.bus + '</span>';
      html += '<span class="school-text">' + (t.school || '—') + '</span>';
      if (t.schoolDepart) html += '<span class="time-chip">出 ' + t.schoolDepart + '</span>';
      if (t.ssArrive)     html += '<span class="time-chip">着 ' + t.ssArrive + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('tab-driver').innerHTML = html || '<div class="loading">乗務員データなし</div>';
}

// ─────────────────────────────────────
// ③ 時刻表タブ（学校・校舎ごとの全時刻）
// ─────────────────────────────────────
function renderTimetable() {
  // 使用中の学校/校舎を収集
  const usedRoutes = new Set();
  [appData.today, appData.tomorrow].forEach(day => {
    day?.buses?.forEach(b => b.trips.forEach(t => { if (t.school) usedRoutes.add(t.school); }));
  });

  if (usedRoutes.size === 0) {
    document.getElementById('tab-timetable').innerHTML = '<div class="loading">時刻データなし</div>';
    return;
  }

  let html = '';
  usedRoutes.forEach(routeStr => {
    const { schoolName, branchName } = parseSchoolBranch(routeStr);
    const rows = (appData.schedule || []).filter(s => s.school === schoolName && s.branch === branchName);
    if (rows.length === 0) return;

    html += '<div class="schedule-card">';
    html += '<div class="schedule-title">🏫 ' + routeStr + '</div>';
    html += '<div class="schedule-row schedule-header"><span>時間割</span><span>学校出発</span><span>SS到着</span><span>授業開始</span><span>SS出発</span><span>学校到着</span></div>';

    rows.sort((a,b) => a.schoolDepart.localeCompare(b.schoolDepart)).forEach(r => {
      html += '<div class="schedule-row">';
      html += '<span><span class="period-tag">' + r.period + '</span></span>';
      html += '<span class="time-val">' + (r.schoolDepart || '—') + '</span>';
      html += '<span class="time-val">' + (r.ssArrive     || '—') + '</span>';
      html += '<span class="time-val">' + (r.classStart   || '—') + '</span>';
      html += '<span class="time-val">' + (r.ssDepart     || '—') + '</span>';
      html += '<span class="time-val">' + (r.schoolArrive || '—') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('tab-timetable').innerHTML = html || '<div class="loading">時刻データなし</div>';
}

// ─────────────────────────────────────
// ④ 運行詳細タブ（点呼・管理者向け）
// ─────────────────────────────────────
function renderNotify() {
  // バスごとに集計
  const busMap = {};
  ['today', 'tomorrow'].forEach(day => {
    const dayData = appData[day];
    if (!dayData?.buses) return;
    dayData.buses.forEach(busEntry => {
      if (!busMap[busEntry.bus]) busMap[busEntry.bus] = [];
      busEntry.trips.forEach(trip => {
        const t = getScheduleTime(trip.school, trip.tripNum);
        busMap[busEntry.bus].push({ tripNum: trip.tripNum, school: trip.school, driver: trip.driver, ...t });
      });
    });
  });

  let html = '<div class="notify-section">';
  html += '<div class="notify-header">📋 運行詳細（点呼・管理者用）</div>';

  Object.keys(busMap).sort((a,b) => Number(a)-Number(b)).forEach(busNum => {
    const trips = busMap[busNum];
    const vCode = VEHICLE_CODES[busNum] || '';

    // テキスト生成（コピー用）
    let lines = ['【バス' + busNum + (vCode ? '　' + vCode : '') + '】'];
    trips.forEach(t => {
      lines.push(t.tripNum + '便　' + (t.driver || '未割当') + '　' + (t.school || '—'));
      if (t.schoolDepart) lines.push('   出発 ' + t.schoolDepart + '  SS着 ' + (t.ssArrive || '—') + '  SS発 ' + (t.ssDepart || '—') + '  到着 ' + (t.schoolArrive || '—'));
    });
    const text = lines.join('\n');

    html += '<div class="notify-box" style="margin-bottom:12px;">';
    html += '<div class="notify-driver-header">';
    html += '<span>🚌 ' + busNum + (vCode ? '　<span style="font-size:12px;opacity:0.85;">' + vCode + '</span>' : '') + '</span>';
    html += '<button class="btn-copy" onclick="copyText(this)">コピー</button></div>';

    // 便ごとの詳細行
    trips.forEach(t => {
      html += '<div style="padding:10px 12px; border-bottom:1px solid #f0f2f5; display:flex; flex-wrap:wrap; gap:8px; align-items:center;">';
      html += '<span class="trip-num">' + t.tripNum + '</span>';
      html += '<span class="driver-name">' + (t.driver || '<span style="color:#bbb">未割当</span>') + '</span>';
      html += '<span class="school-text" style="flex:1;">' + (t.school || '—') + '</span>';
      if (t.schoolDepart) html += '<span class="time-chip">出 ' + t.schoolDepart + '</span>';
      if (t.ssArrive)     html += '<span class="time-chip">SS着 ' + t.ssArrive + '</span>';
      if (t.ssDepart)     html += '<span class="time-chip">SS発 ' + t.ssDepart + '</span>';
      if (t.schoolArrive) html += '<span class="time-chip">到 ' + t.schoolArrive + '</span>';
      html += '</div>';
    });

    html += '<pre class="notify-text" style="display:none;" data-text="' + encodeURIComponent(text) + '"></pre>';
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('tab-notify').innerHTML = html;
}

// ─────────────────────────────────────
// ユーティリティ関数
// ─────────────────────────────────────

// 「学校名 / 校舎名」文字列をパース
function parseSchoolBranch(str) {
  if (!str) return { schoolName: '', branchName: '' };
  const parts = str.split('/').map(s => s.trim());
  return { schoolName: parts[0] || '', branchName: parts[1] || '' };
}

// 時刻表から時刻を取得（trip番号 = 早い順にN番目）
function getScheduleTime(schoolStr, tripNum) {
  if (!schoolStr || !appData?.schedule) return {};
  const { schoolName, branchName } = parseSchoolBranch(schoolStr);
  const rows = appData.schedule
    .filter(s => s.school === schoolName && s.branch === branchName && s.schoolDepart)
    .sort((a,b) => a.schoolDepart.localeCompare(b.schoolDepart));

  if (rows.length === 0) return {};
  const idx = Math.min((tripNum || 1) - 1, rows.length - 1);
  return rows[idx] || {};
}

// HTMLエスケープ
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// テキストコピー
function copyText(btn) {
  const pre  = btn.closest('.notify-box').querySelector('.notify-text');
  const text = decodeURIComponent(pre.dataset.text);
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ コピー完了';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {
    // フォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ コピー完了';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
}

// ─── 初回ロード ───
window.addEventListener('load', loadData);
